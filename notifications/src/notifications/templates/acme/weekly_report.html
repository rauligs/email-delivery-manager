<!doctype html>
<html lang="en">
  <body>
    <h1>Weekly report for {{ name }}</h1>
    <table>
      <thead>
        <tr>
          <th>Metric</th>
          <th>Value</th>
        </tr>
      </thead>
      <tbody>
        {% for row in rows %}
        <tr>
          <td>{{ row.label }}</td>
          <td>{{ row.value }}</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </body>
</html>
